<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Autenticação Segura</title>
  <style>
    /* Tema Midnight */
    :root {
      --bg: #000000;
      --card: #0a0a0a;
      --border: #262626;
      --text: #f5f5f5;
      --text-soft: #a3a3a3;
      --primary: #ffffff;
      --primary-text: #000000;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    
    body {
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    header { text-align: center; margin-bottom: 40px; }
    header h1 { font-size: 2rem; margin-bottom: 10px; }
    header p { color: var(--text-soft); }

    .container {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 800px;
      width: 100%;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      max-width: 350px;
      box-shadow: 0 16px 48px rgba(0,0,0,.6);
    }

    .card h2 { font-size: 1.25rem; margin-bottom: 16px; border-bottom: 1px solid var(--border); padding-bottom: 8px;}

    .input-group { margin-bottom: 16px; display: flex; flex-direction: column; gap: 6px; }
    .input-group label { font-size: 0.9rem; color: var(--text-soft); font-weight: bold; }
    .input-group input {
      padding: 12px;
      border-radius: 8px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    .input-group input:focus { border-color: var(--primary); }

    .btn {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      border: 1px solid var(--primary);
      background: var(--primary);
      color: var(--primary-text);
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.8; }

    #mensagemBox {
      margin-top: 20px;
      padding: 16px;
      border-radius: 8px;
      width: 100%;
      max-width: 720px;
      text-align: center;
      display: none;
      font-weight: bold;
    }
    .sucesso { background: rgba(0, 255, 0, 0.1); border: 1px solid green; color: #4ade80; }
    .erro { background: rgba(255, 0, 0, 0.1); border: 1px solid red; color: #f87171; }
    
    .token-box {
      margin-top: 10px;
      font-size: 0.8rem;
      word-break: break-all;
      color: var(--text-soft);
      background: #000;
      padding: 8px;
      border: 1px dashed var(--border);
    }
  </style>
</head>
<body>

  <header>
    <h1>🔐 Sistema de Autenticação Segura</h1>
    <p>API Node.js + Criptografia bcrypt + JWT (JSON Web Tokens)</p>
  </header>

  <div class="container">
    <div class="card">
      <h2>Criar Conta</h2>
      <div class="input-group">
        <label>E-mail</label>
        <input type="email" id="regEmail" placeholder="seu@email.com">
      </div>
      <div class="input-group">
        <label>Senha</label>
        <input type="password" id="regSenha" placeholder="Crie uma senha forte">
      </div>
      <button class="btn" onclick="registrar()">Cadastrar</button>
    </div>

    <div class="card">
      <h2>Fazer Login</h2>
      <div class="input-group">
        <label>E-mail</label>
        <input type="email" id="logEmail" placeholder="seu@email.com">
      </div>
      <div class="input-group">
        <label>Senha</label>
        <input type="password" id="logSenha" placeholder="Sua senha">
      </div>
      <button class="btn" onclick="login()">Entrar</button>
    </div>
  </div>

  <div id="mensagemBox"></div>

  <script>
    const baseUrl = 'http://localhost:3000/api';
    const msgBox = document.getElementById('mensagemBox');

    function mostrarMensagem(msg, tipo, token = '') {
      msgBox.style.display = 'block';
      msgBox.className = tipo;
      msgBox.innerHTML = msg;
      if (token) {
        msgBox.innerHTML += `<div class="token-box"><strong>Seu Token JWT:</strong><br>${token}</div>`;
      }
    }

    async function registrar() {
      const email = document.getElementById('regEmail').value;
      const senha = document.getElementById('regSenha').value;

      try {
        const res = await fetch(`${baseUrl}/registrar`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, senha })
        });
        const data = await res.json();

        if (res.ok) mostrarMensagem(data.mensagem, 'sucesso');
        else mostrarMensagem(data.erro, 'erro');
      } catch (error) {
        mostrarMensagem('Erro ao conectar com a API', 'erro');
      }
    }

    async function login() {
      const email = document.getElementById('logEmail').value;
      const senha = document.getElementById('logSenha').value;

      try {
        const res = await fetch(`${baseUrl}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, senha })
        });
        const data = await res.json();

        if (res.ok) {
          mostrarMensagem(data.mensagem + " 🎉", 'sucesso', data.token);
        } else {
          mostrarMensagem(data.erro, 'erro');
        }
      } catch (error) {
        mostrarMensagem('Erro ao conectar com a API', 'erro');
      }
    }
  </script>
</body>
</html>
